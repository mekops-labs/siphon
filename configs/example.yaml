# Siphon Configuration Example
# This file demonstrates the core features: Extraction, Transformation, State Management, and Triggering.
version: 2

# ==============================================================================
# 1. COLLECTORS
# Collectors ingest data from external sources and publish raw payloads to the
# internal event bus. Each entry in 'topics' maps an internal alias to a source.
# ==============================================================================
collectors:
  in:
    type: shell
    params:
      interval: 1 # Polling interval in seconds (default is 10)
    topics:
      # For shell collectors, the topic value is the command to execute.
      temperature: "echo '{ \"temp\": 23.5, \"ts\":' $(date +%s) '}'"

  wtr:
    type: rest
    params:
      interval: 5 # Polling interval in seconds (default is 10)
    topics:
      current: "https://wttr.in/?format=%C"

  file:
    type: file
    params:
      interval: 10 # Polling interval in seconds (default is 10)
    topics:
      # For file collectors, the topic value is the file path to read.
      uptime: "/proc/uptime"

sinks:
  ## This sink is used in the pipelines below to print results to the console.
  stdout:
    type: stdout

pipelines:
  # EVENT-DRIVEN PIPELINE (Stateless)
  # Triggers immediately as soon as data arrives on the 'temp_sensor' topic.
  - name: process_uptime
    topics:
      - uptime
    bus_mode: volatile # Data is processed and forgotten; not persisted on the bus.
    parser:
      # Regex parser to extract the first number (uptime in seconds) from the /proc/uptime output.
      type: regex
      vars:
        up: "^(\\d+\\.\\d+)\\s"
    transform:
      - up: "int(float(up))" # Convert extracted uptime string to an integer (seconds)

  - name: process_temp
    topics:
      - temperature
    bus_mode: volatile
    parser:
      # JSONPath parser to extract 'temp' and 'ts' from the JSON string produced by the shell command.
      type: jsonpath
      vars:
        temp: "$.temp"
        ts:   "$.ts"
    transform:
      - temp: "temp * 10"
      - ts: "int(ts)"
      - tempStr: "string(temp/10) + '°C'"

  - name: process_weather
    topics:
      - current
    bus_mode: volatile
    parser:
      type: regex
      vars:
        weather: "^(.*)$"

  # TIME-DRIVEN PIPELINE (Stateful)
  # Triggers on a schedule (every second) and can access the latest values of multiple topics from the bus.
  - name: report
    stateful: true
    type: cron
    schedule: "0/3 * * * * *" # Every second
    topics:
      - process_uptime
      - process_temp
      - process_weather
    transform:
      - tempSum: "(tempSum ?? 0) + process_temp?.temp ?? 0" # This variable will accumulate the sum of all temperature readings over time.
      - eventCount: "(eventCount ?? 0) + 1" # Event count will accumulate how many events we received
    sinks:
      - name: stdout
        # The 'expr' format allows us to compute a new payload using the latest values of 'uptime', 'temp', and 'ts' from the bus.
        format: expr
        spec: |
          {
            "uptime": process_uptime?.up ?? 0,
            "temp": process_temp?.temp ?? 0,
            "ts": process_temp?.ts ?? 0,
            "count": eventCount,
            "tempSum": tempSum ?? 0,
            "now": now()
          }
      - name: stdout
        # The 'template' format allows us to create a human-readable message using the latest 'tempStr' value from the bus.
        format: template
        spec: |>
          Current weather: {{ .process_weather.weather }}, {{ .process_temp.tempStr }}

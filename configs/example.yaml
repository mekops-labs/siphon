version: 2

collectors:
  in:
    type: shell
    params:
      interval: 1
    topics:
      temp: "echo '{ \"temp\": 23.5, \"ts\":' $(date +%s) '}'"

sinks:
  stdout:
    type: stdout

pipelines:
  - name: process_temp
    type: cron
    schedule: "@every 5s"
    topics:
      - temp
    bus_mode: volatile
    parser:
      type: jsonpath
      vars:
        temp: "$.temp"
        ts:   "$.ts"
    transform:
      temp: "temp * 10"
    sinks:
      - name: stdout
        format: expr
        spec: '{ "temperature": temp, "timestamp": ts }'

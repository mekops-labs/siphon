name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install tools
        run: go install github.com/boumenot/gocover-cobertura@v1.4.0
      - name: Test
        run: |
          go fmt $(go list ./... | grep -v /vendor/)
          go vet $(go list ./... | grep -v /vendor/)
          go test -race -coverprofile=coverage.txt -covermode atomic $(go list ./... | grep -v /vendor/)
          go run github.com/boumenot/gocover-cobertura < coverage.txt > coverage.xml
          go tool cover -func=coverage.txt

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: |
          mkdir -p BUILD
          go build -o BUILD ./...

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: ko-build/setup-ko@v0.6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.repository }}
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG=""
            echo "Running on default branch: tag = 'latest'"
          else
            TAG="${{ github.ref_name }}"
            echo "Running on ref '${{ github.ref }}': tag = $TAG"
          fi

          if [[ -z "$TAG" ]]; then
             TAGS_MAIN="latest"
          else
             TAGS_MAIN="${TAG},latest"
          fi

          VERSION=${TAG} ko build --bare --tags ${TAGS_MAIN} --platform=linux/amd64,linux/arm64,linux/arm ./cmd/siphon/
          VERSION=${TAG} ko build --bare --tags ${TAG}-amd64 --platform=linux/amd64 ./cmd/siphon/
          VERSION=${TAG} ko build --bare --tags ${TAG}-aarch64 --platform=linux/arm64 ./cmd/siphon/
          VERSION=${TAG} ko build --bare --tags ${TAG}-armv6hf,${TAG}-armv7hf --platform=linux/arm ./cmd/siphon/

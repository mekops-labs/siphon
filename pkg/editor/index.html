<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Siphon Config Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ext-keybinding_menu.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: #1e1e1e; }
        #header { background: #2c3e50; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        #header h1 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        #header h1 a { color: white; text-decoration: none; padding: 0 10px; border-radius: 4px; transition: background 0.2s; font-size: 22px; cursor: pointer; }
        #header h1 a:hover { background: rgba(255,255,255,0.2); }
        #status-bar { padding: 8px 20px; font-size: 13px; font-weight: bold; display: none; }
        #status-bar.ok    { background: #27ae60; color: white; display: block; }
        #status-bar.error { background: #c0392b; color: white; display: block; }
        #editor { flex-grow: 1; }
        button { background: #3498db; border: none; color: white; padding: 8px 16px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 14px; transition: background 0.2s; }
        button:hover { background: #2980b9; }
        button.secondary { background: #7f8c8d; }
        button.secondary:hover { background: #95a5a6; }
        #save-status { margin-left: 15px; font-size: 14px; color: #f1c40f; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: #2c3e50; color: white; margin: 10% auto; padding: 25px; border-radius: 8px; width: 350px; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .modal-content h2 { margin: 0 0 15px 0; font-size: 20px; border-bottom: 1px solid #3e4f5f; padding-bottom: 10px; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #bdc3c7; }
        .close:hover { color: white; }
        .shortcut-table { width: 100%; border-collapse: collapse; }
        .shortcut-table td { padding: 12px 0; border-bottom: 1px solid #3e4f5f; font-size: 14px; }
        .shortcut-table tr:last-child td { border-bottom: none; }
        code { background: #34495e; padding: 3px 6px; border-radius: 4px; font-family: monospace; color: #e67e22; font-size: 13px; }
    </style>
</head>
<body>
    <div id="header">
        <h1>
            <a href="javascript:history.back()" title="Back">←</a>
            Siphon Pipeline Editor
            <span id="save-status"></span>
        </h1>
        <div style="display: flex; gap: 10px;">
            <button class="secondary" onclick="toggleHelp()">Shortcuts</button>
            <button onclick="saveConfig()">Save Configuration</button>
        </div>
    </div>

    <div id="status-bar"></div>

    <div id="editor">Loading configuration...</div>

    <div id="helpModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleHelp()">&times;</span>
            <h2>Keyboard Shortcuts</h2>
            <table class="shortcut-table">
                <tr><td>Save Config</td><td><code>Ctrl+S</code> / <code>⌘S</code></td></tr>
                <tr><td>Find</td><td><code>Ctrl+F</code> / <code>⌘F</code></td></tr>
                <tr><td>Replace</td><td><code>Ctrl+H</code> / <code>⌘H</code></td></tr>
                <tr><td>Undo</td><td><code>Ctrl+Z</code> / <code>⌘Z</code></td></tr>
                <tr><td>Redo</td><td><code>Ctrl+Shift+Z</code> / <code>⌘⇧Z</code></td></tr>
                <tr><td>Comment</td><td><code>Ctrl+/</code> / <code>⌘/</code></td></tr>
                <tr><td>Show all shortcuts</td><td><code>Ctrl+Alt+H</code></td></tr>
            </table>
        </div>
    </div>

    <script>
        const editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/yaml");
        editor.setFontSize(14);
        editor.setShowPrintMargin(false);

        editor.commands.addCommand({
            name: "save",
            bindKey: {win: "Ctrl-S", mac: "Command-S"},
            exec: function() { saveConfig(); }
        });

        editor.commands.addCommand({
            name: "showKeyboardShortcuts",
            bindKey: {win: "Ctrl-Alt-h", mac: "Command-Alt-h"},
            exec: function(editor) {
                ace.config.loadModule("ace/ext/keybinding_menu", function(module) {
                    module.init(editor);
                    editor.showKeyboardShortcuts();
                });
            }
        });

        window.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
                e.preventDefault();
            }
        });

        function toggleHelp() {
            const modal = document.getElementById('helpModal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('helpModal');
            if (event.target === modal) modal.style.display = 'none';
        }

        function loadConfig() {
            fetch('./api/config')
                .then(res => {
                    if (!res.ok) throw new Error('Failed to load');
                    return res.text();
                })
                .then(data => { editor.setValue(data, -1); })
                .catch(() => {
                    document.getElementById('save-status').innerText = '⚠️ Error loading config.yaml';
                });
        }

        function saveConfig() {
            const content = editor.getValue();
            const saveStatus = document.getElementById('save-status');
            saveStatus.style.color = '#f1c40f';
            saveStatus.innerText = 'Saving...';

            fetch('./api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: content
            })
            .then(res => {
                if (res.ok) {
                    saveStatus.style.color = '#2ecc71';
                    saveStatus.innerText = '✔ Saved — reloading engine...';
                } else {
                    throw new Error('Save failed');
                }
                setTimeout(() => saveStatus.innerText = '', 4000);
                // Refresh engine status sooner after a save
                setTimeout(pollEngineStatus, 500);
            })
            .catch(() => {
                saveStatus.style.color = '#e74c3c';
                saveStatus.innerText = '✖ Error saving configuration';
            });
        }

        function pollEngineStatus() {
            fetch('./api/status')
                .then(r => r.json())
                .then(data => {
                    const bar = document.getElementById('status-bar');
                    bar.className = data.ok ? 'ok' : 'error';
                    bar.innerText = data.ok
                        ? '✔ Engine running'
                        : '✖ Engine error: ' + data.message;
                })
                .catch(() => {});
        }

        loadConfig();
        pollEngineStatus();
        setInterval(pollEngineStatus, 5000);
    </script>
</body>
</html>
